name: Release Chrome Extension

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lấy version từ tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Đóng gói extension
        run: |
          zip -r HotSwapper_${{ steps.version.outputs.VERSION }}.zip \
            manifest.json popup.html popup.js icons/

      - name: Lấy mô tả từ manifest
        id: desc
        run: |
          DESC=$(jq -r '.description' manifest.json)
          VER=$(jq -r '.version' manifest.json)
          echo "DESC=$DESC" >> $GITHUB_OUTPUT
          echo "VER=$VER" >> $GITHUB_OUTPUT

      - name: Tạo GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "⚡ Hot-Swapper ${{ steps.version.outputs.VERSION }}"
          body: |
            ## ⚡ Hot-Swapper ${{ steps.version.outputs.VERSION }} — Chuyển đổi nhanh tài khoản profile

            Quản lý nhiều tài khoản Facebook, Chợ Tốt, hay **bất kỳ trang nào**?
            Hot-Swapper giúp bạn lưu & chuyển đổi phiên đăng nhập chỉ trong **1 click** — không logout, không OTP, không checkpoint.

            ---

            ### 🏗️ Luồng xử lý 3 bước
            ```
            EXTRACT (lấy cookies + storage) → NUKE (xóa sạch fingerprint) → INJECT (bơm session mới)
            ```

            ### ✨ Tính năng chính
            - 🔄 **1 click chuyển đổi** tài khoản, không cần logout
            - 🔐 **Bypass OTP/Checkpoint** bằng cách nuke toàn bộ dấu vết trước khi inject
            - 🌳 **Tree UI** nhóm tài khoản theo trang web
            - 🧠 **Cookie Fingerprint** tự động nhận diện account đang active
            - 🌐 **Cross-site swap**: đang ở FB → bấm nick Chợ Tốt → tự chuyển
            - 📦 **Export/Import** backup với smart merge (trùng tên → giữ bản mới hơn)

            ---

            ### 📥 Cài đặt

            1. Tải file **`HotSwapper_${{ steps.version.outputs.VERSION }}.zip`** ở phần Assets bên dưới ⬇️
            2. Giải nén ra thư mục
            3. Mở `chrome://extensions` → bật **Developer mode** (góc phải)
            4. Bấm **Load unpacked** → chọn thư mục vừa giải nén
            5. Bấm icon ⚡ trên toolbar → Bắt đầu sử dụng!

            ---

            > 💡 Xem [README](../../#readme) để biết hướng dẫn sử dụng chi tiết.
          files: HotSwapper_${{ steps.version.outputs.VERSION }}.zip
          draft: false
          prerelease: false
